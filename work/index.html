<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirect</title>
    <script>
      (function () {
        var m = sessionStorage.getItem("mv_portfolio");
        if (m === "full") {
          window.location.replace("/work.html");
          return;
        }
        if (m === "locked") {
          window.location.replace("/misc.html");
          return;
        }
        window.location.replace("/");
      })();
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
